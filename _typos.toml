# Configuration for the typos spell checker
# https://github.com/crate-ci/typos

[files]
# Skip non-English translated README files (contain legitimate non-English words)
extend-exclude = [
    "README_CN.md",
    "README_ES.md",
    "README_ID.md",
    "README_JP.md",
    "README_KR.md",
    "README_PT-BR.md",
    "README_TR.md",
    # Test data and fixtures
    "pkg/input/formats/testdata/*",
    "pkg/protocols/common/helpers/deserialization/testdata/*",
    # WAF regex patterns (contain intentional fragments)
    "pkg/output/stats/waf/regexes.json",
]

[default.extend-words]
# CLI flag abbreviations used in help text and code
ines = "ines"  # JSONL(ines)
ine = "ine"    # -ine flag suffix
hae = "hae"    # -hae (http-api-endpoint)
ue = "ue"      # -ue (uncover-engine)
ot = "ot"      # -ot flag
# Variable/identifier names
fo = "fo"      # variable name in request_generator.go
# Type from external dependency (projectdiscovery/goflags)
Allowd = "Allowd"
# NooP is a standard abbreviation for No-Operation
Noo = "Noo"
# MisMatched is used as a struct field name
Mis = "Mis"

# SQL keywords in error messages (legitimate SQL keywords)
SELEC = "SELEC"  # Part of "SELECTs" in SQL error messages

# Base64/certificate data fragments and test data values
# These appear in PEM-encoded certificates and test fixtures - typos flags them
# as potential misspellings but they are legitimate base64 alphabet sequences
alo = "alo"    # XML test data (Croatian word "dijete>alo")
Iif = "Iif"    # Base64 encoded test data
BA = "BA"      # Base64 sequence in PEM certificates (cmd/integration-test/generic.go:36)
Iy = "Iy"      # Base64 sequence in PEM certificates (pkg/testutils/integration.go:274)
Iz = "Iz"      # Base64 sequence in PEM certificates
inFo = "inFo"  # Test payload in pkg/model/types/severity/severity_test.go (case-sensitive severity test)
# Test data content
algoritmos = "algoritmos"  # Spanish word in fuzz playground test data
