[files]
extend-exclude = [
    # Non-English translations
    "README_CN.md",
    "README_ES.md",
    "README_ID.md",
    "README_JP.md",
    "README_KR.md",
    "README_PT-BR.md",
    "README_TR.md",
    # Vendor directory
    "vendor/",
    # Go checksum file
    "go.sum",
    # Large files with many false positives (regexes, encoded data, etc.)
    "pkg/output/stats/waf/regexes.json",
    "pkg/input/formats/testdata/ginandjuice.proxify.json",
    "internal/tests/integration/generic_test.go",
    "internal/tests/testutils/integration.go",
    "pkg/protocols/common/helpers/deserialization/testdata/",
    "*.ser",
]

[default.extend-identifiers]
# Go identifiers that cannot be renamed without breaking API
MisMatched = "MisMatched"
NoopWriter = "NoopWriter"
AllowdTypes = "AllowdTypes"
# Deprecated alias kept for backward compatibility
ExludedDastTmplStats = "ExludedDastTmplStats"

[default.extend-words]
# External package API (fileutil.IsWriteable)
Writeable = "Writeable" # TODO(dwisiswant0): Fix in upstream.
# Variable name used for flow annotations
fo = "fo"
# Serbian test data in XML
alo = "alo"
# SQL test data (Spanish)
algoritmos = "algoritmos"
# Base64/hex encoded test data
Noo = "Noo"
# Time zones
IST = "IST"
# Company names/products
aas = "aas"
Inactiv = "Inactiv"
Nin = "Nin"
# SQL keywords in tests
SELECTs = "SELECTs"
SELEC = "SELEC"
# Fragments in test data
Iif = "Iif"
# Java serialization extension
ser = "ser"

[type.go.extend-identifiers]
# Short CLI flag names that appear in help strings
ot = "ot"
ue = "ue"
ine = "ine"
ines = "ines"
hae = "hae"

[type.md.extend-identifiers]
# CLI flag references in documentation
ot = "ot"
ue = "ue"
ine = "ine"
ines = "ines"
hae = "hae"
