id: network-duration

info:
  name: Network Duration
  author: pdteam
  severity: info

flow: tcp("duration_network")

network:
  - id: duration_network
    inputs:
      - data: "FIRST"
        read: 4
        name: first
      - data: "SECOND"
        read: 4
        name: second
    host:
      - "{{Hostname}}"
    read-size: 6
    matchers:
      - type: dsl
        condition: and
        dsl:
          - "duration > 0 && duration < 60"
          - "duration_1 > 0 && duration_1 < 60"
          - "duration_2 > 0 && duration_2 < 60"
          - "duration == duration_2"
          - "duration_network_duration > 0 && duration_network_duration < 60"
          - "duration_network_duration_1 > 0 && duration_network_duration_1 < 60"
          - "duration_network_duration_2 > 0 && duration_network_duration_2 < 60"
          - "duration_network_duration == duration"
          - "duration_network_duration_1 == duration_1"
          - "duration_network_duration_2 == duration_2"
      - type: word
        part: first
        words:
          - "PING"
      - type: word
        part: second
        words:
          - "PONG"
      - type: word
        part: data
        words:
          - "NUCLEI"
    matchers-condition: and
