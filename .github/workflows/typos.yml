name: 🔤 Typos

on:
  push:
    branches: ["dev"]
  pull_request:
  workflow_dispatch:

jobs:
  typos:
    name: "Spell Check"
    if: ${{ !endsWith(github.actor, '[bot]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1
        with:
          config: ./_typos.toml
