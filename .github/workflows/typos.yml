name: Typos Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  typos-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Check spelling with typos
      uses: crate-ci/typos@b67cb3f3f8b7c0f27568b1e19b8f62f6d8a6b1e4 # v1.28.3