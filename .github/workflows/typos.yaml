name: 🔤 Typos

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly
  workflow_dispatch: {}
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

permissions:
  contents: read

jobs:
  typos:
    name: Spell Check with Typos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run typos
        uses: crate-ci/typos@v1.43.5