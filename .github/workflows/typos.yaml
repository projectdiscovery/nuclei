name: 📝 Typos

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run typos spell checker
        uses: crate-ci/typos@v1
