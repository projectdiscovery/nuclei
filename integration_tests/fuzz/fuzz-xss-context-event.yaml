id: fuzz-xss-context-event

info:
  name: XSS Context Analyzer - Event Handler Context
  author: pdteam
  severity: high
  description: Tests XSS detection in HTML event handler attribute context.

http:
  - method: GET
    path:
      - "{{BaseURL}}"
    fuzzing:
      - part: query
        type: replace
        mode: single
        fuzz:
          - "[XSS_CANARY]"
    analyzer:
      name: xss_context
    matchers:
      - type: word
        part: analyzer
        words:
          - "true"
