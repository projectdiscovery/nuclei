id: auth-secret-file-login

info:
  name: Test Auth Login Template
  author: pdteam
  severity: info
  description: Login template for authenticated scanning test

http:
  - raw:
      - |
        POST /login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        
        username={{username}}&password={{password}}

    matchers:
      - type: word
        part: body
        words:
          - "authenticated"

    extractors:
      - type: kval
        part: header
        kval:
          - Set-Cookie
        name: session_cookie
        internal: true
