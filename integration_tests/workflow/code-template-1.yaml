id: code-template-1

info:
  name: code-template-1
  author: tovask
  severity: info
  tags: code

code:
  - engine:
      - py
      - python3
      - python
    source: |
      print("hello from first")
    extractors:
      - type: regex
        name: extracted
        regex:
          - 'hello from (.*)'
        group: 1
