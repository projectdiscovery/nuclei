id: flow-request-condition-payloads

info:
  name: Flow with request condition and payloads
  author: test
  severity: info

flow: http()

http:
  - raw:
      - |
        GET /step1 HTTP/1.1
        Host: {{Hostname}}

      - |
        POST /login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        username={{username}}&password={{password}}

      - |
        GET /admin?token={{auth}} HTTP/1.1
        Host: {{Hostname}}

    attack: pitchfork
    payloads:
      username:
        - admin
      password:
        - secret123

    matchers-condition: and
    matchers:
      - type: word
        part: body_2
        words:
          - "login-ok"

      - type: word
        part: body_3
        words:
          - "admin-ok"

    extractors:
      - type: regex
        name: auth
        internal: true
        part: header_2
        group: 1
        regex:
          - 'X-Auth-Token: ([a-z0-9]+)'
