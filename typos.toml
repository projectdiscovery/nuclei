[files]
extend-exclude = [
    "README_*.md",  # translation files
    "integration_tests/**",  # test payloads
    "cmd/integration-test/**",  # integration test code
    "**/testdata/**",  # test data directories
    "**/*.json",  # JSON files (mostly data)
    "**/*.xml",  # XML files (mostly data)
]

[default.extend-words]
ot = "ot"
fo = "fo"
hae = "hae"
ue = "ue"
ba = "ba"
selec = "selec"
alo = "alo"
iz = "iz"
iy = "iy"
algoritmos = "algoritmos"
iif = "iif"
# The following are parts of code identifiers that typos flags after splitting.
mis = "mis"
allowd = "allowd"
exluded = "exluded" # needed for deprecated ExludedDastTmplStats alias in parser_stats.go; remove when alias is dropped
noo = "noo"
mismatched = "mismatched"
