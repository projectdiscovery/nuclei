[files]
extend-exclude = [
    "README_*.md",  # translation files
    "integration_tests/**",  # test payloads
    "cmd/integration-test/**",  # integration test code
    "**/testdata/**",  # test data directories
    "**/*.json",  # JSON files (mostly data)
    "**/*.xml",  # XML files (mostly data)
]

